name: release

on:
  push:
    tags:
      - v*

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6

  build:
    name: build-and-release
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == v* ]]; then
            VERSION="$TAG"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build all platforms
        env:
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "version: $VERSION"
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=$VERSION" -o wisper .
          mv wisper wisper-linux-amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=$VERSION" -o wisper .
          mv wisper wisper-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=$VERSION" -o wisper .
          mv wisper wisper-darwin-arm64
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=$VERSION" -o wisper.exe .
          mv wisper.exe wisper-windows-amd64.exe

      - name: Package
        run: |
          tar -cvJf wisper-linux-amd64-${{ steps.version.outputs.VERSION }}.tar.xz -C . wisper-linux-amd64
          tar -cvJf wisper-darwin-amd64-${{ steps.version.outputs.VERSION }}.tar.xz -C . wisper-darwin-amd64
          tar -cvJf wisper-darwin-arm64-${{ steps.version.outputs.VERSION }}.tar.xz -C . wisper-darwin-arm64
          zip wisper-windows-amd64-${{ steps.version.outputs.VERSION }}.zip wisper-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wisper-linux-amd64-*.tar.xz
            wisper-darwin-amd64-*.tar.xz
            wisper-darwin-arm64-*.tar.xz
            wisper-windows-amd64-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
